name: KBO Daily Crawl

on:
  schedule:
    - cron: "33 13 * * 2-5" # 화~금 22:33 KST
    - cron: "33 12 * * 6"   # 토 21:33 KST
    - cron: "33 9 * * 0"    # 일 18:33 KST
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run today's crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_SECRET_KEY: ${{ secrets.SUPABASE_API_SECRET_KEY }}
        run: python main.py --today
